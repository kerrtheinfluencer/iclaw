<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iclaw" />
    <link rel="apple-touch-icon" href="/iclaw/icons/icon-192.png" />
    <title>iclaw</title>
    <script>
      // Register COI service worker to enable SharedArrayBuffer → multi-thread WASM
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./coi-serviceworker.js').then(function(reg) {
          if (reg.installing) {
            reg.installing.addEventListener('statechange', function() {
              if (this.state === 'activated' && !crossOriginIsolated) {
                window.location.reload();
              }
            });
          }
        }).catch(function(e) {
          console.warn('COI SW failed:', e);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
