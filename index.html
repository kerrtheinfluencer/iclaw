<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iclaw" />
    <link rel="apple-touch-icon" href="/iclaw/icons/icon-192.png" />
    <link rel="manifest" href="/iclaw/manifest.webmanifest" />
    <title>iclaw</title>
    <script>
      // Register COI service worker FIRST — before anything else loads
      // This enables SharedArrayBuffer → multi-thread WASM → 3-5x faster inference
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/iclaw/coi-serviceworker.js').then(function(reg) {
          // If we just installed, reload once to activate COOP/COEP headers
          if (reg.installing) {
            reg.installing.addEventListener('statechange', function() {
              if (this.state === 'activated') {
                // Only reload if not already cross-origin isolated
                if (!crossOriginIsolated) window.location.reload();
              }
            });
          }
        }).catch(function(e) {
          console.warn('COI service worker registration failed:', e);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/iclaw/src/main.jsx"></script>
  </body>
</html>
